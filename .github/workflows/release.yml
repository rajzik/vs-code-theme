name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check-format

      - name: Package extension
        run: pnpm package

  changesets:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Open release pull request
        uses: changesets/action@v1
        with:
          version: pnpm run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Detect version change
        id: version
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./packages/vscode-theme/package.json').version")"
          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_VERSION="$(
            git show HEAD^:packages/vscode-theme/package.json \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["version"])'
          )"

          if [ "${CURRENT_VERSION}" = "${PREVIOUS_VERSION}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.version.outputs.changed == 'true'
        run: |
          node scripts/release-notes.mjs \
            packages/vscode-theme/CHANGELOG.md \
            "${{ steps.version.outputs.current }}" > release-notes.md

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.current }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
            exit 0
          fi

          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --notes-file release-notes.md
