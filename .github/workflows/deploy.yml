name: Deploy Release

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/common-actions/install

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v$(node -p "require('./packages/vscode-theme/package.json').version")"

          if ! TARGET_COMMITISH="$(
            gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.target_commitish'
          )"; then
            echo "No GitHub release found for ${TAG}; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${TARGET_COMMITISH}" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Release ${TAG} points to ${TARGET_COMMITISH}, not this workflow run."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        if: steps.release.outputs.should_deploy == 'true'
        run: pnpm --filter rajzik-theme run package

      - name: Upload VSIX to release
        if: steps.release.outputs.should_deploy == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" \
            packages/vscode-theme/dist/rajzik-theme.vsix \
            --clobber

      - name: Publish to Visual Studio Marketplace
        if: steps.release.outputs.should_deploy == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm --filter rajzik-theme exec vsce publish --skip-duplicate -p "$VSCE_PAT"
